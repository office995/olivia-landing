<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Prompt Generator — Elegancy</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --bg2: #12121c;
            --gold: #c9a84c;
            --gold-dim: #8a6f2f;
            --gold-glow: rgba(201, 168, 76, 0.25);
            --indigo: #6366f1;
            --indigo-glow: rgba(99, 102, 241, 0.2);
            --white: #f0f0f8;
            --gray: #8888aa;
            --error: #ef4444;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .container {
            max-width: 820px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--indigo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        header p {
            color: var(--gray);
            font-size: 0.85rem;
            margin-top: 0.4rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Input section */
        .input-section { margin-bottom: 1.5rem; }

        .textarea-wrap {
            position: relative;
        }

        #ideaInput {
            width: 100%;
            min-height: 160px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--white);
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            padding: 1rem;
            padding-right: 3.5rem;
            resize: vertical;
            transition: border-color 0.3s;
            outline: none;
        }

        #ideaInput:focus {
            border-color: var(--gold-dim);
        }

        #ideaInput::placeholder {
            color: var(--gray);
            opacity: 0.6;
        }

        .mic-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.4);
            color: var(--gray);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .mic-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

        .mic-btn.listening {
            color: var(--gold);
            border-color: var(--gold);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 var(--gold-glow); }
            50% { box-shadow: 0 0 0 12px transparent; }
        }

        .mic-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .input-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.6rem;
            font-size: 0.78rem;
            color: var(--gray);
        }

        .char-count { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; }

        .warning {
            color: var(--error);
            font-size: 0.78rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .warning.visible { opacity: 1; }

        .generate-btn {
            width: 100%;
            padding: 0.9rem;
            margin-top: 1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            color: var(--bg);
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.02em;
        }

        .generate-btn:hover:not(:disabled) {
            box-shadow: 0 0 24px var(--gold-glow);
            transform: translateY(-1px);
        }

        .generate-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* Output section */
        .output-section {
            margin-top: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .output-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .output-card {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .output-card.has-content {
            border-image: linear-gradient(135deg, var(--gold), var(--indigo), var(--gold)) 1;
            border-width: 1px;
            border-style: solid;
            border-radius: 16px;
            border: none;
            background-origin: border-box;
            background-clip: padding-box, border-box;
            position: relative;
        }

        .output-card.has-content::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, var(--gold), var(--indigo), var(--gold));
            background-size: 200% 200%;
            animation: gradientMove 4s ease infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .output-card.error-state {
            border-color: var(--error) !important;
        }

        .output-card.error-state::before {
            background: var(--error);
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .output-label {
            font-size: 0.78rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .copy-btn {
            padding: 0.4rem 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            background: transparent;
            color: var(--gray);
            font-family: 'Syne', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
        .copy-btn.copied { border-color: var(--gold); color: var(--gold); }

        .output-body {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.65;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--white);
            max-height: 60vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-dim) transparent;
        }

        .output-body::-webkit-scrollbar { width: 6px; }
        .output-body::-webkit-scrollbar-track { background: transparent; }
        .output-body::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

        /* Loading state */
        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--gray);
            font-size: 0.85rem;
        }

        .loading-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        .error-text { color: var(--error); }

        /* Speech unsupported tooltip */
        .mic-tooltip {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            font-size: 0.7rem;
            color: var(--gray);
            opacity: 0.5;
            cursor: default;
        }

        @media (max-width: 640px) {
            body { padding: 1rem 0.75rem; }
            header h1 { font-size: 1.5rem; }
            #ideaInput { min-height: 130px; font-size: 0.9rem; }
            .output-body { font-size: 0.78rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Perfect Prompt Generator</h1>
            <p>by Elegancy Agency</p>
        </header>

        <div class="card input-section">
            <div class="textarea-wrap">
                <textarea id="ideaInput" placeholder="Describe your idea — type it out or click the mic to speak it..."></textarea>
                <div id="micContainer"></div>
            </div>
            <div class="input-meta">
                <span id="warning" class="warning">Please enter your idea before generating.</span>
                <span id="charCount" class="char-count">0 characters</span>
            </div>
            <button id="generateBtn" class="generate-btn" disabled>Generate Prompt</button>
        </div>

        <div id="outputSection" class="output-section">
            <div id="outputCard" class="output-card">
                <div class="output-header">
                    <span class="output-label">Generated Prompt</span>
                    <button id="copyBtn" class="copy-btn" style="display:none;">Copy</button>
                </div>
                <div id="outputBody" class="output-body"></div>
            </div>
        </div>
    </div>

    <script>
        const BRAIN_SYSTEM_PROMPT = `You are the world's most advanced Claude Code Prompt Architect. Your ONLY job is to transform a user's raw, unfiltered idea — however messy, spoken, or incomplete — into a perfectly engineered, zero-failure Claude Code prompt.

You operate at hyper-human reasoning level. You do not take inputs literally — you understand *intent*. You read between the lines. You fill structural gaps. You anticipate what the user actually wants built and what Claude Code will need to know to build it without errors, ambiguity, or hallucination.

You understand that Claude 4.x takes instructions *literally*. It does not infer. It does not guess. It does not expand vague requests. Therefore your output must be explicit, complete, and leave nothing to interpretation.

EVERY prompt you generate must follow this exact structure (use these exact XML-style headers in your output):

---

## ROLE
[One sentence. Who Claude Code is for this task. Make it specific to the domain being built.]

## CONTEXT
[2-4 sentences. What project/product/system this fits into. What already exists. What the user's goals are. Why this matters. What NOT to do or build beyond scope.]

## TASK
[The core build instruction. Be specific about what to create. Use concrete nouns — not vague verbs. Include filenames, tech stack, and architecture decisions where relevant. If it's a UI, describe the exact components. If it's an API, describe the endpoints. If it's a script, describe the inputs/outputs.]

## TECHNICAL REQUIREMENTS
[Bullet list. Every tech constraint: language, framework, libraries, file structure, environment. If the user didn't specify, make smart inferences based on what they're building. Include version preferences where relevant.]

## ACCEPTANCE CRITERIA
[Bullet list. This is the definition of done. Each item must be binary — either it's done or it isn't. No vague items like "works well." Each criterion must be testable. E.g. "User can click X and Y happens" or "API returns Z when given input W."]

## OUTPUT FORMAT
[Describe exactly how Claude Code should deliver its output: which files to create, what the file structure should look like, whether to write to disk, whether to show a summary after finishing. Be explicit.]

## CONSTRAINTS & EDGE CASES
[Bullet list. What Claude Code must NOT do. Common failure modes to avoid. Security considerations. Things to handle gracefully. Explicit scope limits.]

## SUCCESS SIGNAL
[One sentence. How the user will know the task is completely done and working correctly.]

---

RULES YOU MUST FOLLOW:

1. NEVER produce a vague prompt. If the user gave you a vague idea, you make it specific. That is your job.
2. ALWAYS fill in what the user didn't say if it's needed to make the prompt complete and executable.
3. NEVER add unnecessary complexity. Only include what the build actually requires.
4. ALWAYS explain WHY constraints exist, not just state them — Claude Code follows motivated instructions better.
5. ALWAYS write Acceptance Criteria as binary, testable conditions.
6. NEVER use filler phrases like "comprehensive," "robust," or "user-friendly" without defining what those mean concretely.
7. If the user's idea is for a UI, always specify visual behavior, states, and interactions explicitly.
8. If the user's idea involves AI or APIs, always specify the model, the call structure, error handling, and expected response format.
9. Output ONLY the generated prompt — no preamble, no explanation, no meta-commentary. Just the finished, ready-to-paste Claude Code prompt.
10. The prompt you produce must be good enough that Claude Code can execute it in one pass, without needing to ask clarifying questions.`;

        // DOM elements
        const ideaInput = document.getElementById('ideaInput');
        const generateBtn = document.getElementById('generateBtn');
        const charCount = document.getElementById('charCount');
        const warning = document.getElementById('warning');
        const outputSection = document.getElementById('outputSection');
        const outputCard = document.getElementById('outputCard');
        const outputBody = document.getElementById('outputBody');
        const copyBtn = document.getElementById('copyBtn');
        const micContainer = document.getElementById('micContainer');

        let isLoading = false;
        let recognition = null;
        let isListening = false;

        // Speech Recognition setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const micBtn = document.createElement('button');
            micBtn.className = 'mic-btn';
            micBtn.title = 'Click to speak your idea';
            micBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
            micContainer.appendChild(micBtn);

            micBtn.addEventListener('click', toggleListening);
        } else {
            const tooltip = document.createElement('span');
            tooltip.className = 'mic-tooltip';
            tooltip.textContent = 'Voice input not supported';
            micContainer.appendChild(tooltip);
        }

        function toggleListening() {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }

        function startListening() {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            const baseText = ideaInput.value;

            recognition.onresult = function(event) {
                let interim = '';
                let final = '';
                for (let i = 0; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        final += transcript;
                    } else {
                        interim += transcript;
                    }
                }
                ideaInput.value = baseText + (baseText ? ' ' : '') + final + interim;
                updateCharCount();
                updateGenerateBtn();
            };

            recognition.onerror = function(event) {
                stopListening();
                if (event.error === 'not-allowed') {
                    showError('Microphone access denied. Please allow microphone permissions.');
                }
            };

            recognition.onend = function() {
                stopListening();
            };

            try {
                recognition.start();
                isListening = true;
                const micBtn = micContainer.querySelector('.mic-btn');
                if (micBtn) micBtn.classList.add('listening');
            } catch (e) {
                showError('Could not start speech recognition.');
            }
        }

        function stopListening() {
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
                recognition = null;
            }
            isListening = false;
            const micBtn = micContainer.querySelector('.mic-btn');
            if (micBtn) micBtn.classList.remove('listening');
        }

        // Character count
        ideaInput.addEventListener('input', function() {
            updateCharCount();
            updateGenerateBtn();
            warning.classList.remove('visible');
        });

        function updateCharCount() {
            const len = ideaInput.value.length;
            charCount.textContent = len + ' character' + (len !== 1 ? 's' : '');
        }

        function updateGenerateBtn() {
            generateBtn.disabled = isLoading || ideaInput.value.trim().length === 0;
        }

        // Generate
        generateBtn.addEventListener('click', generate);

        async function generate() {
            const input = ideaInput.value.trim();
            if (!input) {
                warning.classList.add('visible');
                return;
            }

            warning.classList.remove('visible');
            isLoading = true;
            updateGenerateBtn();
            generateBtn.textContent = 'Generating...';

            // Show loading
            outputSection.classList.add('visible');
            outputCard.classList.remove('has-content', 'error-state');
            copyBtn.style.display = 'none';
            outputBody.innerHTML = '<div class="loading-indicator"><span class="loading-dots"><span></span><span></span><span></span></span> Architecting your prompt...</div>';

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 8000,
                        system: BRAIN_SYSTEM_PROMPT,
                        messages: [
                            { role: 'user', content: input }
                        ]
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `API error: ${response.status}`);
                }

                const data = await response.json();
                const text = data.content?.[0]?.text || 'No output received.';

                outputBody.textContent = text;
                outputCard.classList.add('has-content');
                outputCard.classList.remove('error-state');
                copyBtn.style.display = 'inline-block';
            } catch (err) {
                showError(err.message || 'Something went wrong. Please try again.');
            } finally {
                isLoading = false;
                generateBtn.textContent = 'Generate Prompt';
                updateGenerateBtn();
            }
        }

        function showError(message) {
            outputSection.classList.add('visible');
            outputCard.classList.add('error-state');
            outputCard.classList.remove('has-content');
            copyBtn.style.display = 'none';
            outputBody.innerHTML = '<span class="error-text">' + escapeHtml(message) + '</span>';
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // Copy
        copyBtn.addEventListener('click', async function() {
            try {
                await navigator.clipboard.writeText(outputBody.textContent);
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 2000);
            } catch (e) {
                copyBtn.textContent = 'Failed';
                setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
            }
        });
    </script>
</body>
</html>
